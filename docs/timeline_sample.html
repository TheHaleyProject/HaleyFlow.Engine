<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workflow Timeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }
    .tl-item:not(:last-child) .tl-left::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 44px;
      bottom: -32px;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, #fca5a5, #fee2e2);
    }
    .act-row:hover { background: #fff5f5; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tl-item { animation: slideIn .3s ease both; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

<div class="max-w-3xl mx-auto px-4 py-10">
  <div id="root"></div>
</div>

<script>
const DATA = {
  "instance": {
    "id": 1857, "guid": "84bedec7-1ae2-11f1-8266-8c8caad7d6a5",
    "entity_id": "04e829026e7c400fb94d7a00afc62ba7",
    "def_id": 1998, "def_name": "projectchangerequest",
    "def_version_id": 1988, "def_version": 1,
    "current_state_id": 2020, "current_state": "Approved",
    "last_event_id": 1996, "last_event": "SteeringApproved",
    "created": "2026-03-09 02:21:39", "modified": "2026-03-09 02:40:20"
  },
  "timeline": [
    { "lifecycle_id": 2000, "created": "2026-03-09 02:21:39",
      "from_state": "RequestLogged", "to_state": "ImpactAssessment",
      "event": "AutoStart", "event_code": 4000, "actor": "wfe.adminapi.test",
      "is_initial": true, "is_terminal": false, "activities": [] },
    { "lifecycle_id": 2008, "created": "2026-03-09 02:39:35",
      "from_state": "ImpactAssessment", "to_state": "CostReview",
      "event": "ImpactAccepted", "event_code": 4001, "actor": "wfe.test.consumer",
      "is_initial": false, "is_terminal": false,
      "activities": [{ "runtime_id": 2001, "state": "ImpactAssessment", "actor_id": "wfe.test.consumer",
        "activity": "app.change.impact.assess", "status": "approved",
        "created": "2026-03-09 02:27:31", "modified": "2026-03-09 02:39:35" }] },
    { "lifecycle_id": 2011, "created": "2026-03-09 02:39:58",
      "from_state": "CostReview", "to_state": "ScheduleReview",
      "event": "CostAccepted", "event_code": 4003, "actor": "wfe.test.consumer",
      "is_initial": false, "is_terminal": false,
      "activities": [{ "runtime_id": 2017, "state": "CostReview", "actor_id": "wfe.test.consumer",
        "activity": "app.change.cost.review", "status": "approved",
        "created": "2026-03-09 02:39:37", "modified": "2026-03-09 02:40:10" }] },
    { "lifecycle_id": 2014, "created": "2026-03-09 02:40:14",
      "from_state": "ScheduleReview", "to_state": "SteeringDecision",
      "event": "ScheduleAccepted", "event_code": 4005, "actor": "wfe.test.consumer",
      "is_initial": false, "is_terminal": false,
      "activities": [{ "runtime_id": 2027, "state": "ScheduleReview", "actor_id": "wfe.test.consumer",
        "activity": "app.change.schedule.review", "status": "approved",
        "created": "2026-03-09 02:39:58", "modified": "2026-03-09 02:40:14" }] },
    { "lifecycle_id": 2015, "created": "2026-03-09 02:40:20",
      "from_state": "SteeringDecision", "to_state": "Approved",
      "event": "SteeringApproved", "event_code": 4007, "actor": "wfe.test.consumer",
      "is_initial": false, "is_terminal": true,
      "activities": [{ "runtime_id": 2032, "state": "SteeringDecision", "actor_id": "wfe.test.consumer",
        "activity": "app.change.steering.decide", "status": "approved",
        "created": "2026-03-09 02:40:16", "modified": "2026-03-09 02:40:20" }] }
  ]
};

const STATUS_PILL = {
  approved: 'bg-emerald-50 text-emerald-700 border-emerald-200',
  rejected:  'bg-red-50 text-red-700 border-red-200',
  pending:   'bg-amber-50 text-amber-700 border-amber-200',
};
function statusPill(s) { return STATUS_PILL[s] || 'bg-slate-50 text-slate-600 border-slate-200'; }

function fmt(dt, full = false) {
  const d = new Date(dt.replace(' ', 'T') + 'Z');
  return full
    ? d.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:true })
    : d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:true });
}
function dur(a, b) {
  const m = Math.round((new Date(b.replace(' ','T')+'Z') - new Date(a.replace(' ','T')+'Z')) / 60000);
  return m < 1 ? '&lt;1m' : m < 60 ? `${m}m` : `${Math.floor(m/60)}h ${m%60}m`;
}
function camel(s) { return s.replace(/([A-Z])/g, ' $1').trim(); }

// ── Instance Header ───────────────────────────────────────────
function header() {
  const i = DATA.instance;
  return `
    <div class="rounded-2xl overflow-hidden shadow-md mb-8" style="border:1px solid #4a0f0f">
      <div class="px-6 pt-5 pb-5" style="background:linear-gradient(135deg,#1a0404 0%,#4a0f0f 100%)">
        <div class="flex items-start justify-between gap-4 flex-wrap">
          <div class="min-w-0">
            <div class="flex items-center gap-2 mb-2 flex-wrap">
              <span class="text-xs uppercase tracking-widest font-bold" style="color:#f4a0a0">${i.def_name}</span>
              <span class="text-xs px-2 py-0.5 rounded border" style="color:#f4c0c0;border-color:rgba(200,80,80,0.4);background:rgba(180,40,40,0.2)">v${i.def_version}</span>
            </div>
            <p class="text-white font-bold text-base tracking-tight break-all">${i.entity_id}</p>
            <p class="text-xs mt-0.5 font-mono" style="color:rgba(240,160,160,0.5)">${i.guid}</p>
          </div>
          <div class="flex-shrink-0 text-right">
            <div class="text-xs mb-1 uppercase tracking-wide" style="color:#f4a0a0">Current State</div>
            <div class="inline-block px-3 py-1.5 rounded-lg" style="background:rgba(180,40,40,0.25);border:1px solid rgba(200,80,80,0.35)">
              <span class="font-semibold text-sm" style="color:#ffd0d0">${i.current_state}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="bg-white px-6 py-3 flex flex-wrap gap-5 text-xs" style="border-top:1px solid #fecaca">
        <div class="text-slate-500"><span class="font-semibold text-slate-700 block">Last Event</span>${camel(i.last_event)}</div>
        <div class="text-slate-500"><span class="font-semibold text-slate-700 block">Started</span>${fmt(i.created, true)}</div>
        <div class="text-slate-500"><span class="font-semibold text-slate-700 block">Completed</span>${fmt(i.modified, true)}</div>
        <div class="text-slate-500"><span class="font-semibold text-slate-700 block">Total Duration</span>${dur(i.created, i.modified)}</div>
        <div class="text-slate-500"><span class="font-semibold text-slate-700 block">Transitions</span>${DATA.timeline.length} steps</div>
      </div>
    </div>`;
}

// ── Activity rows ─────────────────────────────────────────────
function activities(acts) {
  if (!acts.length) return `<p class="text-xs text-slate-400 italic px-4 pb-4">No activities recorded.</p>`;
  return `<div class="px-4 pb-4 space-y-2">` +
    acts.map(a => `
      <div class="act-row flex items-center gap-3 border border-slate-100 rounded-lg px-3 py-2.5 transition-colors">
        <div class="flex-1 min-w-0">
          <code class="text-xs text-slate-700 block truncate">${a.activity}</code>
          <span class="text-xs text-slate-400 font-mono mt-0.5 block truncate">${a.actor_id}</span>
        </div>
        <div class="flex flex-col items-end gap-1 flex-shrink-0">
          <span class="text-xs px-2 py-0.5 rounded-full border font-medium ${statusPill(a.status)}">${a.status}</span>
          <span class="text-xs text-slate-400">${dur(a.created, a.modified)}</span>
        </div>
      </div>`).join('') + `</div>`;
}

// ── Timeline item ─────────────────────────────────────────────
function timelineItem(item, idx, isLast, nextItem, prevWasTerminal) {
  const isReopen = idx > 0 && prevWasTerminal;

  const bannerBadge = item.is_initial
    ? `<span class="text-xs font-semibold px-2.5 py-0.5 rounded-full" style="background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.35);color:#a7f3d0">Workflow Started</span>`
    : item.is_terminal
      ? `<span class="text-xs font-semibold px-2.5 py-0.5 rounded-full" style="background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.35);color:#fca5a5">Workflow Ended</span>`
      : isReopen
        ? `<span class="text-xs font-semibold px-2.5 py-0.5 rounded-full" style="background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.35);color:#fde68a">Reopened</span>`
        : '';

  const badgeRow = bannerBadge
    ? `<div class="mt-2 pt-2 flex" style="border-top:1px solid rgba(255,255,255,0.1)">${bannerBadge}</div>`
    : '';

  return `
    <div class="tl-item flex gap-4" style="animation-delay:${(idx * 0.07).toFixed(2)}s">
      <div class="tl-left relative flex flex-col items-center flex-shrink-0 w-10">
        <div class="w-10 h-10 rounded-full shadow-sm flex items-center justify-center z-10 flex-shrink-0 text-white font-semibold text-sm"
             style="background:#9b1c1c">
          ${idx + 1}
        </div>
      </div>
      <div class="flex-1 pb-8 min-w-0">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow duration-200">

          <!-- Transition banner -->
          <div class="px-4 py-3" style="background:linear-gradient(135deg,#3a0a0a 0%,#7a1a1a 100%)">
            <div class="flex items-center gap-3">
              <div class="flex-1 min-w-0">
                <div class="text-xs uppercase tracking-wider mb-0.5" style="color:#f4a0a0">From</div>
                <div class="text-white font-medium text-sm leading-tight">${item.from_state}</div>
              </div>
              <svg class="w-4 h-4 flex-shrink-0" style="color:#e07070" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5-5 5M6 12h12"/>
              </svg>
              <div class="flex-1 min-w-0 text-right">
                <div class="text-xs uppercase tracking-wider mb-0.5" style="color:#f4a0a0">To</div>
                <div class="text-white font-medium text-sm leading-tight">${item.to_state}</div>
              </div>
            </div>
            ${badgeRow}
          </div>

          <!-- Event meta -->
          <div class="px-4 py-3 border-b border-slate-100">
            <div class="flex items-start justify-between gap-3 flex-wrap">
              <div>
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="font-semibold text-slate-800 text-sm">${camel(item.event)}</span>
                  <span class="text-xs px-1.5 py-0.5 rounded font-mono" style="background:#fff1f2;color:#be123c;border:1px solid #fecdd3">evt:${item.event_code}</span>
                  <span class="text-xs bg-slate-50 text-slate-400 border border-slate-200 px-1.5 py-0.5 rounded font-mono">lc:${item.lifecycle_id}</span>
                </div>
                <code class="text-xs text-slate-400 mt-1.5 block">${item.actor}</code>
              </div>
              <div class="text-right flex-shrink-0">
                <div class="text-xs text-slate-400">${fmt(item.created)}</div>
                ${item.activities.length ? `<div class="text-xs mt-0.5" style="color:#be123c">${item.activities.length} activit${item.activities.length>1?'ies':'y'}</div>` : ''}
              </div>
            </div>
          </div>

          <!-- Activities -->
          <div class="pt-3">${activities(item.activities)}</div>
        </div>

        ${!isLast && nextItem ? `
          <div class="mt-3 ml-1">
            <span class="text-xs text-slate-400">${dur(item.created, nextItem.created)} to next step</span>
          </div>` : ''}
      </div>
    </div>`;
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const tl = DATA.timeline;
  let prevWasTerminal = false;
  const items = tl.map((item, i) => {
    const html = timelineItem(item, i, i === tl.length - 1, tl[i + 1] ?? null, prevWasTerminal);
    prevWasTerminal = !!item.is_terminal;
    return html;
  }).join('');

  document.getElementById('root').innerHTML =
    header() + `<div class="space-y-0">${items}</div>`;
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
